<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShield // Secure Verification Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #06090e; 
            color: #c9d1d9; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        .terminal-box { 
            background-color: #0d1117; 
            border: 1px solid #30363d; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
        }
        .glow-title {
            text-shadow: 0 0 12px rgba(245, 158, 11, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 tracking-tight">

    <div class="terminal-box w-full max-w-md p-6 md:p-8 rounded-2xl border-yellow-500/20 border">
        
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-yellow-500/10 text-yellow-500 mb-3 glow-title">
                ⚠️
            </div>
            <h1 class="text-xl font-bold text-yellow-500 tracking-wide uppercase mb-1">
                Verification Required
            </h1>
            <p class="text-xs text-gray-500 font-medium uppercase tracking-wider">Identity Multi-Factor Handshake</p>
        </div>

        <div class="bg-gray-900/60 p-3.5 border border-gray-800/80 rounded-xl mb-5 flex justify-between items-center">
            <span class="text-xs text-gray-400 font-medium uppercase tracking-wider">Active Operator:</span>
            <span class="text-cyan-400 font-bold tracking-wide text-sm bg-cyan-950/40 px-2.5 py-1 rounded-lg border border-cyan-800/30">📡 {{ username }}</span>
        </div>

        <div class="space-y-3" id="verification-deck">
            <label class="block text-[11px] text-gray-400 font-bold uppercase tracking-wider mb-1">Select Security Checkpoint:</label>
            
            <button onclick="selectProtocol('google')" class="w-full bg-gray-900/40 border border-gray-800 hover:border-cyan-500/60 p-3.5 rounded-xl text-left text-xs font-bold text-gray-300 flex justify-between items-center transition-all duration-200 hover:scale-[1.01]">
                <span>🤖 GOOGLE RE-AUTHENTICATOR SYNC</span>
                <span class="text-[10px] font-sans bg-cyan-950 text-cyan-400 px-2 py-0.5 rounded-md border border-cyan-800/50">READY</span>
            </button>

            <button onclick="selectProtocol('apple')" class="w-full bg-gray-900/40 border border-gray-800 hover:border-gray-500 p-3.5 rounded-xl text-left text-xs font-bold text-gray-300 flex justify-between items-center transition-all duration-200 hover:scale-[1.01]">
                <span>🍏 APPLE ID CRYPTO HANDSHAKE</span>
                <span class="text-[10px] font-sans bg-gray-800 text-gray-400 px-2 py-0.5 rounded-md border border-gray-700/50">STANDBY</span>
            </button>

            <button onclick="selectProtocol('mac')" class="w-full bg-gray-900/40 border border-gray-800 hover:border-purple-500/60 p-3.5 rounded-xl text-left text-xs font-bold text-gray-300 flex justify-between items-center transition-all duration-200 hover:scale-[1.01]">
                <span>💻 DEVICE MAC SECURE FOOTPRINT</span>
                <span class="text-[10px] font-sans bg-purple-950 text-purple-400 px-2 py-0.5 rounded-md border border-purple-800/50">SCANNER</span>
            </button>

            <button onclick="selectProtocol('number')" class="w-full bg-gray-900/40 border border-gray-800 hover:border-yellow-500/60 p-3.5 rounded-xl text-left text-xs font-bold text-gray-300 flex justify-between items-center transition-all duration-200 hover:scale-[1.01]">
                <span>📱 MOBILE SECURE NUMBER OTP BURST</span>
                <span class="text-[10px] font-sans bg-yellow-950 text-yellow-400 px-2 py-0.5 rounded-md border border-yellow-800/50">SMS LINK</span>
            </button>
        </div>

        <form id="verify-form" class="hidden mt-4 space-y-4 pt-4 border-t border-gray-800/60 animate-fadeIn">
            <input type="hidden" name="method" id="selected-method">
            
            <div>
                <label id="input-label" class="block text-[11px] text-gray-400 font-bold uppercase tracking-wider mb-2">Enter Token Sequence:</label>
                <input type="text" name="token" id="token-input" placeholder="000000" class="w-full bg-gray-900 p-3 border border-gray-700 rounded-xl text-center font-bold tracking-widest text-sm text-yellow-400 focus:outline-none focus:border-yellow-500 shadow-inner" required>
                <p id="tip-text" class="text-[11px] text-gray-400 mt-2 bg-yellow-950/20 border border-yellow-900/30 p-2.5 rounded-xl text-center font-medium"></p>
            </div>

            <div class="flex gap-2 pt-1">
                <button type="button" onclick="cancelVerify()" class="w-1/3 bg-gray-900 border border-gray-800 hover:bg-gray-800 text-gray-400 font-bold py-2.5 rounded-xl text-xs transition-all uppercase tracking-wider">
                    Back
                </button>
                <button type="submit" class="w-2/3 bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-2.5 rounded-xl text-xs transition-all uppercase tracking-widest shadow-md font-sans">
                    Confirm Identity
                </button>
            </div>
        </form>
        
        <div id="error-output" class="mt-4 p-3 bg-red-950/40 border border-red-500/40 rounded-xl text-red-400 text-xs hidden text-center font-bold"></div>

    </div>

    <script>
        function selectProtocol(method) {
            document.getElementById('verification-deck').classList.add('hidden');
            const form = document.getElementById('verify-form');
            form.classList.remove('hidden');
            document.getElementById('selected-method').value = method;
            document.getElementById('error-output').classList.add('hidden');

            const label = document.getElementById('input-label');
            const tip = document.getElementById('tip-text');
            const input = document.getElementById('token-input');

            if (method === 'google' || method === 'number') {
                label.innerText = method === 'google' ? "Enter Google Authenticator Passcode:" : "Enter Mobile SMS Verification OTP:";
                input.placeholder = "Enter 4-digit token...";
                tip.innerHTML = "✨ <b>Testing Passcode:</b> Use simulation override token <span class='text-yellow-400 font-mono font-bold px-1 rounded bg-black'>7721</span> to clear access checkpoints.";
            } else if (method === 'apple') {
                label.innerText = "Authorize Apple ID Cryptographic Key Link:";
                input.placeholder = "Enter authorization code...";
                tip.innerHTML = "✨ <b>Testing Passcode:</b> Enter <span class='text-yellow-400 font-mono font-bold px-1 rounded bg-black'>7721</span> to pass handshake variables.";
            } else if (method === 'mac') {
                label.innerText = "Match Hardware Network Environment Footprint:";
                input.placeholder = "Enter physical hardware override code...";
                tip.innerHTML = "✨ <b>Testing Passcode:</b> Type <span class='text-yellow-400 font-mono font-bold px-1 rounded bg-black'>7721</span> to register device identity.";
            }
        }

        function cancelVerify() {
            document.getElementById('verification-deck').classList.remove('hidden');
            document.getElementById('verify-form').classList.add('hidden');
            document.getElementById('error-output').classList.add('hidden');
        }

        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorBox = document.getElementById('error-output');
            errorBox.classList.add('hidden');

            const bodyData = new URLSearchParams();
            bodyData.append('method', document.getElementById('selected-method').value);
            bodyData.append('token', document.getElementById('token-input').value);

            const res = await fetch('/api/auth/verify-submit', {
                method: 'POST',
                body: bodyData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });

            const data = await res.json();
            if (data.success) {
                window.location.href = "/";
            } else {
                errorBox.innerText = `❌ ${data.error}`;
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
