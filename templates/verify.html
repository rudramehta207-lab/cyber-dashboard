<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShield // Security Verification Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #06090e; color: #c9d1d9; font-family: monospace; }
        .terminal-box { background-color: #0d1117; border: 1px solid #30363d; box-shadow: 0 0 15px rgba(34, 211, 238, 0.05); }
        .glitch-text { text-shadow: 0 0 8px rgba(234, 179, 8, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="terminal-box w-full max-w-md p-6 md:p-8 rounded-lg border-yellow-500/30 border">
        
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-yellow-500 tracking-widest uppercase glitch-text mb-1">
                ⚠️ Verification Required
            </h1>
            <p class="text-[11px] text-gray-500 uppercase">Operator Session Pending // Identity Multi-Factor Handshake</p>
        </div>

        <div class="bg-black/40 p-3 border border-gray-800 rounded mb-4 text-xs">
            <span class="text-gray-400 block uppercase">Target Node Operator:</span>
            <span class="text-cyan-400 font-bold uppercase tracking-wider text-sm">📡 ${username}</span>
        </div>

        <div class="space-y-3" id="verification-deck">
            <label class="block text-[10px] text-gray-400 uppercase tracking-wider mb-1">Select Authentication Protocol Node:</label>
            
            <button onclick="selectProtocol('google')" class="w-full bg-gray-900 border border-gray-800 hover:border-cyan-500 p-3 rounded text-left text-xs font-bold text-gray-300 flex justify-between items-center transition">
                <span>🤖 GOOGLE RE-AUTHENTICATOR SYNC</span>
                <span class="text-[9px] bg-cyan-950 text-cyan-400 px-1.5 py-0.5 rounded border border-cyan-800">READY</span>
            </button>

            <button onclick="selectProtocol('apple')" class="w-full bg-gray-900 border border-gray-800 hover:border-gray-400 p-3 rounded text-left text-xs font-bold text-gray-300 flex justify-between items-center transition">
                <span>🍏 APPLE ID CRYPTO HANDSHAKE</span>
                <span class="text-[9px] bg-gray-800 text-gray-400 px-1.5 py-0.5 rounded border border-gray-600">STANDBY</span>
            </button>

            <button onclick="selectProtocol('mac')" class="w-full bg-gray-900 border border-gray-800 hover:border-purple-500 p-3 rounded text-left text-xs font-bold text-gray-300 flex justify-between items-center transition">
                <span>💻 DEVICE MAC ADDRESS SECURE FOOTPRINT</span>
                <span class="text-[9px] bg-purple-950 text-purple-400 px-1.5 py-0.5 rounded border border-purple-800">SCANNER</span>
            </button>

            <button onclick="selectProtocol('number')" class="w-full bg-gray-900 border border-gray-800 hover:border-yellow-500 p-3 rounded text-left text-xs font-bold text-gray-300 flex justify-between items-center transition">
                <span>📱 MOBILE SECURE NUMBER OTP BURST</span>
                <span class="text-[9px] bg-yellow-950 text-yellow-400 px-1.5 py-0.5 rounded border border-yellow-800">SMS GATEWAY</span>
            </button>
        </div>

        <form id="verify-form" class="hidden mt-4 space-y-4 pt-4 border-t border-gray-800/60">
            <input type="hidden" name="method" id="selected-method">
            
            <div>
                <label id="input-label" class="block text-[10px] text-gray-400 uppercase tracking-wider mb-1">Enter Security Token Ring:</label>
                <input type="text" name="token" id="token-input" placeholder="Enter code response string..." class="w-full bg-gray-900 p-2.5 border border-gray-700 rounded text-center font-bold tracking-widest text-xs text-yellow-400 focus:outline-none focus:border-yellow-500" required>
                <p id="tip-text" class="text-[9px] text-gray-500 mt-1 italic text-center"></p>
            </div>

            <div class="flex gap-2">
                <button type="button" onclick="cancelVerify()" class="w-1/3 bg-gray-900 border border-gray-800 hover:bg-gray-800 text-gray-400 font-bold py-2 rounded text-xs transition uppercase tracking-wider">
                    Back
                </button>
                <button type="submit" class="w-2/3 bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-2 rounded text-xs transition uppercase tracking-widest">
                    EXECUTE SIGNATURE MATCH
                </button>
            </div>
        </form>
        
        <div id="error-output" class="mt-4 p-2.5 bg-red-950/40 border border-red-500 rounded text-red-400 text-xs hidden text-center font-bold"></div>

    </div>

    <script>
        function selectProtocol(method) {
            document.getElementById('verification-deck').classList.add('hidden');
            const form = document.getElementById('verify-form');
            form.classList.remove('hidden');
            document.getElementById('selected-method').value = method;
            document.getElementById('error-output').classList.add('hidden');

            const label = document.getElementById('input-label');
            const tip = document.getElementById('tip-text');
            const input = document.getElementById('token-input');

            if (method === 'google' || method === 'number') {
                label.innerText = method === 'google' ? "Enter Google Authenticator OTP Token:" : "Enter Mobile SMS Verification Token:";
                input.placeholder = "E.G., 7721";
                tip.innerText = "💡 System Simulation Bypass Code for testing is: 7721";
            } else if (method === 'apple') {
                label.innerText = "Execute Apple ID Passkey Challenge:";
                input.placeholder = "Type '7721' to authorize verification token...";
                tip.innerText = "💡 Simulation bypass handshake parameter: 7721";
            } else if (method === 'mac') {
                label.innerText = "Simulate Hardware MAC Address Matching Handshake:";
                input.placeholder = "Type '7721' to spoof verified environment network frame...";
                tip.innerText = "💡 Simulation bypass hardware footprint parameter: 7721";
            }
        }

        function cancelVerify() {
            document.getElementById('verification-deck').classList.remove('hidden');
            document.getElementById('verify-form').classList.add('hidden');
            document.getElementById('error-output').classList.add('hidden');
        }

        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorBox = document.getElementById('error-output');
            errorBox.classList.add('hidden');

            const bodyData = new URLSearchParams();
            bodyData.append('method', document.getElementById('selected-method').value);
            bodyData.append('token', document.getElementById('token-input').value);

            const res = await fetch('/api/auth/verify-submit', {
                method: 'POST',
                body: bodyData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });

            const data = await res.json();
            if (data.success) {
                window.location.href = "/";
            } else {
                errorBox.innerText = `❌ ${data.error}`;
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
